name: Lint

on:
  push:
    branches: [main]
  pull_request:
    # يفضل تحديد الفروع المستهدفة هنا أيضاً
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    env:
      # المتغيرات هنا وهمية فقط لإرضاء Prisma أثناء توليد الأنواع
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/postgres'
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        # هذه الخطوة حاسمة لضمان عدم ظهور أخطاء (Module has no exported member) على السيرفر
        run: npx prisma generate

      - name: Run lint
        # هذا سيفحص الكود والتوثيق (JSDoc) بناءً على قواعدنا الجديدة
        run: npm run lint