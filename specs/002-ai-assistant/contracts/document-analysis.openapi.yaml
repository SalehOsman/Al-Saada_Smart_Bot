openapi: 3.0.0
info:
  title: Document Analysis Service
  description: Document parsing with hybrid OCR (Gemini Vision + DeepSeek-OCR) and data extraction
  version: 1.0.0

paths:
  /documents/upload:
    post:
      summary: Upload document for analysis
      description: Uploads PDF, image, or Excel file for OCR and data extraction with automatic provider selection
      security:
        - bearerAuth
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Document file (max 10MB)
                targetModule:
                  type: string
                  description: Optional target module for data mapping
                ocrProvider:
                  type: string
                  enum: [gemini_vision, deepseek_ocr, auto]
                  default: auto
                  description: OCR provider to use (auto = system default with automatic fallback)
      responses:
        '201':
          description: Document uploaded and analysis started
          content:
            application/json:
              schema:
                type: object
                properties:
                  analysisId:
                    type: string
                  status:
                    type: string
                    enum: [processing, completed, failed]
                  estimatedTime:
                    type: integer
                    description: Estimated processing time in seconds
                  ocrProvider:
                    type: string
                    description: Provider being used for this document
        '400':
          description: Invalid file type or size
        '413':
          description: File too large (max 10MB)

  /documents/{id}:
    get:
      summary: Get document analysis result
      security:
        - bearerAuth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Document analysis result
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  fileName:
                    type: string
                  fileType:
                    type: string
                  extractedData:
                    type: object
                    additionalProperties: true
                  ocrText:
                    type: string
                    nullable: true
                  ocrProvider:
                    type: string
                    enum: [gemini_vision, deepseek_ocr]
                    description: Provider that processed this document
                  providerFallback:
                    type: boolean
                    description: Whether primary provider failed and fallback was used
                  confidence:
                    type: number
                    format: float
                  moduleSuggestion:
                    type: string
                    nullable: true
                  status:
                    type: string
                    enum: [processing, completed, failed]
        '404':
          description: Document not found
        '403':
          description: User lacks permission

  /documents/{id}/extracted-data:
    get:
      summary: Get extracted structured data
      description: Returns only structured fields for direct data entry
      security:
        - bearerAuth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  fields:
                    type: object
                    description: Extracted field names and values
                  confidence:
                    type: number
                    format: float

  /documents/{id}/save-to-module:
    post:
      summary: Save extracted data to module
      description: Saves extracted data to specified module
      security:
        - bearerAuth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetModule:
                  type: string
                  description: Module slug to save data to
                fields:
                  type: object
                  description: Field values (allows editing of extracted data)
      responses:
        '201':
          description: Data saved to module
          content:
            application/json:
              schema:
                type: object
                properties:
                  recordId:
                    type: string
                  module:
                    type: string
        '400':
          description: Invalid module or field validation failed
        '403':
          description: User lacks permission for target module

  /documents/types:
    get:
      summary: Get supported document types
      description: Returns list of supported file formats and their limits
      security:
        - bearerAuth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  supported:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [pdf, image, excel]
                        extensions:
                          type: array
                          items:
                            type: string
                        maxSize:
                          type: integer
                          description: Maximum size in bytes
                        ocrProviders:
                          type: array
                          items:
                            type: object
                            properties:
                              provider:
                                type: string
                                enum: [gemini_vision, deepseek_ocr]
                              recommendedFor:
                                type: array
                                items:
                                  type: string
                                  description: Document types this provider handles best

  /documents/analyze/{id}:
    post:
      summary: Ask AI question about document
      description: Allows Q&A on uploaded document contents
      security:
        - bearerAuth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [question]
              properties:
                question:
                  type: string
                  maxLength: 500
      responses:
        '200':
          description: AI answer based on document
          content:
            application/json:
              schema:
                type: object
                properties:
                  answer:
                    type: string
                  sources:
                    type: array
                    items:
                      type: string
                      description: Relevant sections from document
                  confidence:
                    type: number
                    format: float

  /documents/ocr/providers:
    get:
      summary: Get available OCR providers
      description: Returns available OCR providers with capabilities
      security:
        - bearerAuth
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  defaultProvider:
                    type: string
                    enum: [gemini_vision, deepseek_ocr]
                  providers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          enum: [gemini_vision, deepseek_ocr]
                        name:
                          type: string
                        description:
                          type: string
                        supportsTables:
                          type: boolean
                          description: Whether provider handles table extraction well
                        supportsArabic:
                          type: boolean
                          description: Whether provider supports Arabic text
                        averageTime:
                          type: integer
                          description: Average processing time per page (seconds)

  /documents/ocr/retry/{id}:
    post:
      summary: Retry OCR with different provider
      description: Re-processes document with alternative OCR provider
      security:
        - bearerAuth
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [gemini_vision, deepseek_ocr]
                  description: Provider to retry with
      responses:
        '202':
          description: OCR retry initiated
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
        '400':
          description: Same provider as before or invalid provider
        '404':
          description: Document not found

components:
  schemas:
    ExtractedField:
      type: object
      properties:
        name:
          type: string
          description: Field name (e.g., vendor, amount, date)
        value:
          type: string
          description: Extracted value
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        sourceRegion:
          type: object
          properties:
            page:
              type: integer
            x:
              type: number
            y:
              type: number
            width:
              type: number
            height:
              type: number
          description: Bounding box of extracted region

securitySchemes:
  bearerAuth:
    type: http
    scheme: bearer
    bearerFormat: JWT
